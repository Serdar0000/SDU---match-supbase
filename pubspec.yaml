name: sdu_match
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  supabase_flutter: ^2.9.4
  glassmorphism: ^3.0.0
  google_fonts: ^6.1.0
  lottie: ^2.4.0
  go_router: ^17.0.0
  flutter_card_swiper: ^7.2.0
  get_it: ^9.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_localization: ^0.3.3
  image_picker: ^1.2.1
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  flutter_launcher_icons: ^0.13.1
  firebase_core: ^3.11.0
  firebase_messaging: 15.2.10
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.11.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icons/

flutter_launcher_icons:
